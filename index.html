<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني 🛒</title>
    
    <!-- ⚠️ الصق كود التحقق الخاص بجوجل (Meta Tag) في السطر الأسفل مباشرة ⚠️ -->
    

    <style>
        /* --- 🎨 قسم التنسيق (CSS) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 20px;
            color: #2c3e50;
        }
        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #dcdde1;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .cart-summary span {
            font-weight: bold;
            color: #2ecc71;
        }
        .shop-main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .product-card {
            border: 1px solid #dcdde1;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .product-card .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #34495e;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background-color: #27ae60;
        }
        .cart-section {
            border: 1px solid #dcdde1;
            border-radius: 8px;
            padding: 20px;
            background-color: #fff;
            align-self: start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }
        .remove-btn {
            background-color: #e74c3c;
            padding: 4px 8px;
            font-size: 0.8rem;
        }
        .remove-btn:hover {
            background-color: #c0392b;
        }
        .checkout-btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-top: 15px;
        }
        .empty-cart {
            color: #7f8c8d;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- --- 🧱 قسم الهيكل (HTML) --- -->
    <div class="shop-container">
        <header>
            <h1>متجري الإلكتروني 🛒</h1>
            <div class="cart-summary">
                السلة: <span id="cart-count">0</span> منتجات | الإجمالي: <span id="cart-total">0</span>$
            </div>
        </header>

        <main class="shop-main">
            <!-- قائمة المنتجات المتاحة -->
            <section>
                <h2>المنتجات المتاحة</h2>
                <div class="products-grid" id="products-container"></div>
            </section>

            <!-- صندوق سلة التسوق -->
            <section class="cart-section">
                <h2>محتويات السلة</h2>
                <div id="cart-items-container">
                    <div class="empty-cart">السلة فارغة حالياً.</div>
                </div>
                <button class="checkout-btn" id="checkout-btn" style="display: none;" onclick="checkout()">إتمام الشراء</button>
            </section>
        </main>
    </div>

    <!-- --- 🧠 قسم التفاعل (JavaScript) --- -->
    <script>
        // البيانات التجريبية للمنتجات
        const products = [
            { id: 1, name: 'هاتف ذكي حديث', price: 500 },
            { id: 2, name: 'ساعة ذكية رياضية', price: 150 },
            { id: 3, name: 'سماعات لاسلكية', price: 80 },
            { id: 4, name: 'شاحن سريع 65 واط', price: 30 }
        ];

        // مصفوفة حفظ عناصر السلة
        let cart = [];

        // توليد بطاقات المنتجات وعرضها في الصفحة تلقائياً
        const productsContainer = document.getElementById('products-container');
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <h3>${product.name}</h3>
                <p class="price">${product.price}$</p>
                <button onclick="addToCart(${product.id})">إضافة إلى السلة</button>
            `;
            productsContainer.appendChild(card);
        });

        // دالة إضافة منتج للسلة وزيادة الكمية
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        // دالة حذف منتج أو تقليل الكمية من السلة
        function removeFromCart(productId) {
            const index = cart.findIndex(item => item.id === productId);
            if (index !== -1) {
                if (cart[index].quantity > 1) {
                    cart[index].quantity--;
                } else {
                    cart.splice(index, 1);
                }
            }
            updateCartUI();
        }

        // دالة تحديث الحسابات والعدادات واجهة السلة
        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items-container');
            const cartCountSpan = document.getElementById('cart-count');
            const cartTotalSpan = document.getElementById('cart-total');
            const checkoutBtn = document.getElementById('checkout-btn');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="empty-cart">السلة فارغة حالياً.</div>';
                cartCountSpan.innerText = '0';
                cartTotalSpan.innerText = '0';
                checkoutBtn.style.display = 'none';
                return;
            }

            cartItemsContainer.innerHTML = '';
            let totalCount = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalCount += item.quantity;
                totalPrice += (item.price * item.quantity);

                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <span>${item.name} (x${item.quantity})</span>
                    <span>${item.price * item.quantity}$</span>
                    <button class="remove-btn" onclick="removeFromCart(${item.id})">حذف</button>
                `;
                cartItemsContainer.appendChild(itemDiv);
            });

            cartCountSpan.innerText = totalCount;
            cartTotalSpan.innerText = totalPrice;
            checkoutBtn.style.display = 'block';
        }

        // دالة التنبيه وإتمام الشراء
        function checkout() {
            const total = document.getElementById('cart-total').innerText;
            alert(`شكرًا لشرائك! تم تسجيل طلبك بإجمالي: ${total}$`);
            cart = [];
            updateCartUI();
        }
    </script>
</body>
</html>
